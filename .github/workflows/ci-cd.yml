name: ci-cd

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Repository ni olish
        uses: actions/checkout@v4

      - name: Python o‘rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependency larni o‘rnatish
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m compileall src app scripts tests

      - name: Unit test
        run: |
          pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Repository ni olish
        uses: actions/checkout@v4

      - name: Docker image build
        run: |
          docker build -t hotel-booking-api:latest .

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Repository ni olish
        uses: actions/checkout@v4

      - name: Secrets tekshirish
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2 secrets topilmadi. Deploy bosqichi skip qilinadi."
            exit 0
          fi

      - name: SSH tayyorlash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: EC2 ga deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" 'bash -s' <<'EOF'
            set -e
            if [ ! -d ~/hotel_booking_fastapi_docker_cicd_ec2_ml ]; then
              echo "Repo EC2 ichida topilmadi. Avval repository ni clone qiling."
              exit 1
            fi
            cd ~/hotel_booking_fastapi_docker_cicd_ec2_ml
            git pull
            chmod +x deployment/ec2_update_container.sh
            ./deployment/ec2_update_container.sh
          EOF
